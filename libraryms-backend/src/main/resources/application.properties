# ── Server ──────────────────────────────────────────
#server.servlet.context-path=/api

# ── Database (H2 in-memory for development) ─────────
spring.datasource.url=jdbc:h2:file:./data/librarydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────
# update = leaves existing tables and data untouched on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────
# Change this secret to any long random string in production
jwt.secret=3f8a2b1c9d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a
# Token expires after 24 hours (in milliseconds)
jwt.expiration=86400000